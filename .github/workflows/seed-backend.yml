name: Seed backend product data

# Weekly re-seed of backend JSON from compears-data-wrangling (Mondays 06:00 UTC).
# Daily scrapers run in ComPears/compears-data-wrangling (.github/workflows/update_stores.yaml).

on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  seed-backend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout backend
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout data-wrangling
        uses: actions/checkout@v4
        with:
          repository: ComPears/compears-data-wrangling
          ref: main
          path: compears-data-wrangling
          fetch-depth: 0
          # For a private wrangling repo, add secret WRANGLING_REPO_TOKEN (PAT with repo read)
          token: ${{ secrets.WRANGLING_REPO_TOKEN || github.token }}

      - name: Sync data-wrangling to latest main
        working-directory: compears-data-wrangling
        run: git pull --rebase origin main

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install backend dependencies
        run: npm ci

      - name: Seed all stores from data-wrangling
        env:
          WRANGLING_PATH: ${{ github.workspace }}/compears-data-wrangling
        run: npm run seed

      - name: Import store locations from OpenStreetMap
        run: npm run import-stores

      - name: Upload seeded data artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-product-data
          path: src/data/nl/*.json
          retention-days: 14

      - name: Commit seeded product data
        if: github.ref == 'refs/heads/main'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/data/nl/*.json
          if git diff --cached --quiet; then
            echo "No product data changes to commit"
          else
            git commit -m "chore: weekly seed from data-wrangling and OSM store import $(date -u +%Y-%m-%d)"
            git push
          fi

      - name: Trigger Render backend redeploy
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK_URL" ]; then
            echo "RENDER_DEPLOY_HOOK_URL not set; skipping Render redeploy"
            exit 0
          fi
          curl -fsS -X POST "$RENDER_DEPLOY_HOOK_URL"
          echo "Render deploy hook triggered"

      - name: Verify deployed backend readiness
        env:
          BACKEND_BASE_URL: ${{ vars.BACKEND_BASE_URL }}
        run: |
          if [ -z "$BACKEND_BASE_URL" ]; then
            echo "::warning::BACKEND_BASE_URL repository variable is not set; skipping deployed readiness verification."
            exit 0
          fi

          health_url="${BACKEND_BASE_URL%/}/health/ready"
          for attempt in $(seq 1 18); do
            if payload=$(curl -fsS --max-time 15 "$health_url"); then
              echo "$payload" | tee readiness.json
              echo "### Backend readiness" >> "$GITHUB_STEP_SUMMARY"
              echo '```json' >> "$GITHUB_STEP_SUMMARY"
              echo "$payload" >> "$GITHUB_STEP_SUMMARY"
              echo '```' >> "$GITHUB_STEP_SUMMARY"
              exit 0
            fi
            echo "Readiness attempt $attempt/18 failed; waiting for deployment..."
            sleep 10
          done

          echo "::error::Backend did not become ready at $health_url after 3 minutes. Check Render deploy logs, catalog freshness, and memory checks."
          exit 1
